<div class="container">
  <div id="myCarousel" class="carousel slide" data-ride="carousel">
    <div class="carousel-inner">
      {% for img in carrousels %}
      <div class="carousel-item {% if forloop.first %} active {% else %} {% endif %}" style="margin-bottom: -100px;">
      {% if img.url %}
        <a href={{ img.url }} target="_blank" ><img class="d-block w-100 img-fluid" src="{{ img.imagen.url }}" alt="{{ img.nombre }}" style="margin-top:95px;" ></a>
      {% else %}
        <img class="d-block w-100 img-fluid" src="{{ img.imagen.url }}" alt="{{ img.nombre }}" />
      {% endif %}
      </div>
      {% endfor %}
    </div>
    <a class="carousel-control-prev" href="#myCarousel" role="button" data-slide="prev">
      <span class="carousel-control-prev-icon" aria-hidden="true"></span>
      <span class="sr-only">Previous</span>
    </a>
    <a class="carousel-control-next" href="#myCarousel" role="button" data-slide="next">
      <span class="carousel-control-next-icon" aria-hidden="true"></span>
      <span class="sr-only">Next</span>
    </a>
  </div>
</div>
