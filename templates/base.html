<!DOCTYPE html>
<html lang="en">
<head>
    {% load static %}
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" type="text/css" href="{% static 'css/bootstrap.css' %}">
    <link rel="stylesheet" type="text/css" href="{% static 'css/carousel.css' %}">
    <link rel="stylesheet" type="text/css" href="{% static 'css/blog.css' %}">
    <link rel="stylesheet" type="text/css" href="{% static 'css/menu.css' %}">
    <link rel="stylesheet" type="text/css" href="{% static 'css/style.css' %}">
    <link href="{% static 'fontawesomefree/css/fontawesome.css' %}" rel="stylesheet" type="text/css">
    <link href="{% static 'fontawesomefree/css/brands.css' %}" rel="stylesheet" type="text/css">
    <link href="{% static 'fontawesomefree/css/solid.css' %}" rel="stylesheet" type="text/css">
    <link href="{% static 'fontawesomefree/css/all.min.css' %}" rel="stylesheet" type="text/css">
    <link rel="icon" href="{% static '/img/tecnm.jpg' %}" sizes="32x32">
    <script src="{% static 'fontawesomefree/js/all.min.js' %}"></script>
    {% block css %}
    {% endblock %}
    <title>{% block title %}Instituto Tecnológico de Tuxtla Guetiérrez{% endblock %}</title>
</head>
<body style="{% block color %}background-color:white;{% endblock %}">
    <div class="container container-sm container-md container-lg container-xl container-fuid h-100" style="margin-top:50px;">
        <div class="h-100">
            <div class="col-xl-12 col-md-12">
                {% block navbar %}
                
                {% endblock %}
            </div>

            <div class="container">
                {% block carrousel %}
                
                {% endblock %}
            </div>

            <div class="container">
                {% block content %}
                
                {% endblock %}
            </div>

            <div class="container">
                {% block footer %}
                
                {% endblock %}
            </div>
        </div>
    </div>
    <script src="https://code.jquery.com/jquery-3.5.1.min.js" integrity="sha256-9/aliU8dGd2tb6OSsuzixeV4y/faTqgFtohetphbbj0=" crossorigin="anonymous"></script>
    <script src="{% static 'js/jquery-slim.min.js' %}"></script>
    <script src="{% static 'js/popper.min.js' %}"></script>
    <script src="{% static 'js/bootstrap.bundle.min.js' %}"></script>
    <script src="{% static 'js/bootstrap.js' %}"></script>
    <script src="{% static 'js/bootstrap.min.js' %}"></script>
    <script src="{% static 'js/holder.min.js' %}"></script>
    {% block js %}
    {% endblock %}
</body>
</html>
